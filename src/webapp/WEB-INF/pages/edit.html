<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change User List</title>
</head>
<body>

<h2>Edit user</h2>

<form th:action="@{/users/update}" method="post">

    <input type="hidden" name="id" th:value="${editUser.id}" />

    Name: <input name="name" th:value="${editUser.name}"/>
    Last name: <input name="lastName" th:value="${editUser.lastName}"/>
    Age: <input name="age" th:value="${editUser.age}"/>

    <button type="submit">Update</button>
</form>

</body>
</html>
