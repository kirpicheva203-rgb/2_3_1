<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users List</title>
</head>
<body>

<h2>Users list</h2>

<table border="1">
    <tr>
        <th>ID</th><th>Name</th><th>Last Name</th><th>Age</th><th>Actions</th>
    </tr>

    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.lastName}"></td>
        <td th:text="${u.age}"></td>

        <td>
            <form th:action="@{/users/delete}" method="post">
                <input type="hidden" name="id" th:value="${u.id}" />
                <button type="submit">Delete</button>
            </form>

            <form th:action="@{/users/edit}" method="post">
                <input type="hidden" name="id" th:value="${u.id}" />
                <button type="submit">Edit</button>
            </form>
        </td>
    </tr>
</table>

<h3>Add user</h3>

<form th:action="@{/users/add}" method="post">
    Name: <input name="name"/>
    Last name: <input name="lastName"/>
    Age: <input name="age"/>
    <button type="submit">Add</button>
</form>

</body>
</html>
